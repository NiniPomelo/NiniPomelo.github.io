    <style>
        :root {
            --primary: #00ffff;
            --secondary: #ff00ff;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --text-main: #ffffff;
            --neon-glow: 0 0 15px rgba(0, 255, 255, 0.5);

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; cursor: crosshair; background-color: var(--bg-dark); }
        body { margin: 0; font-family: 'Roboto Mono', monospace; color: var(--text-main); overflow-x: hidden; }

        #three-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- 1. 新版按鈕樣式：邊框流光 --- */
        nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: center; 
            gap: 20px; padding: 25px 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            padding: 12px 24px;
            color: var(--primary);
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            background: transparent;
            transition: color 0.4s;
            overflow: hidden; /* 為了背景填充效果 */
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* 液態背景填充 */
        .nav-btn::before {
            content: '';
            position: absolute; top: 100%; left: 0;
            width: 100%; height: 100%;
            background: var(--primary);
            transition: top 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: -1;
        }

        .nav-btn:hover { color: #000; font-weight: bold; }
        .nav-btn:hover::before { top: 0; }

        /* --- 2. 內容佈局 --- */

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .card {

            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); }

        footer { text-align: center; padding: 60px; opacity: 0.3; font-size: 10px; letter-spacing: 2px; }

        @media (max-width: 768px) { nav { gap: 5px; } .nav-btn { padding: 8px 12px; font-size: 10px; } }

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/sal.js@0.8.5/dist/sal.js"></script>

<script>
    /* -----------------------------------------------------------
       1. Three.js 背景：高斯平滑流體網格
    ----------------------------------------------------------- */
    let scene, camera, renderer, terrain;
    let mouseX = 0, mouseY = 0;
    let targetMouseX = 0, targetMouseY = 0;

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 18, 30);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-container').appendChild(renderer.domElement);

        const geometry = new THREE.PlaneGeometry(160, 160, 80, 80);
        const material = new THREE.MeshBasicMaterial({
            color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.12
        });

        terrain = new THREE.Mesh(geometry, material);
        terrain.rotation.x = -Math.PI / 2;
        terrain.position.y = -5;
        scene.add(terrain);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // 滑鼠位置平滑過渡 (Easing)
        mouseX += (targetMouseX - mouseX) * 0.05;
        mouseY += (targetMouseY - mouseY) * 0.05;

        const time = performance.now() * 0.0008;
        const positions = terrain.geometry.attributes.position.array;
        
        const gX = mouseX * 90;
        const gZ = -mouseY * 90;

        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const y = positions[i + 1];

            // 基礎波浪
            let z = Math.sin(x * 0.1 + time) * 1.2 + Math.cos(y * 0.1 + time) * 1.2;

            // 高斯平滑引力計算
            const dist = Math.sqrt(Math.pow(x - gX, 2) + Math.pow(y - gZ, 2));
            // sigma 決定了平滑範圍，數值越大，影響越廣越平緩
            const sigma = 15; 
            const ripple = Math.exp(-(dist * dist) / (2 * sigma * sigma)) * 10;
            
            // 疊加平滑後的漣漪
            positions[i + 2] = z + (Math.sin(dist * 0.3 - time * 4) * ripple * 0.5); 
        }

        terrain.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }

    window.addEventListener('mousemove', (e) => {
        targetMouseX = (e.clientX / window.innerWidth) - 0.5;
        targetMouseY = (e.clientY / window.innerHeight) - 0.5;
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initThree();

    /* -----------------------------------------------------------
       2. 初始化其他功能
    ----------------------------------------------------------- */
    sal({ threshold: 0.1, once: true });
</script>
