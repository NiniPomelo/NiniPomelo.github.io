<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUYOU CHOU | NEURAL_ARCHITECT_LIGHT</title>
    
    <link href="https://unpkg.com/sal.js@0.8.5/dist/sal.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffff;
            --accent: #ff0033;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 255, 0.4); /* 稍微調亮邊框 */
            --font: 'Syncopate', 'JetBrains Mono', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;800&display=swap');

        * { box-sizing: border-box; outline: none; }
        html, body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow-x: hidden; 
            cursor: crosshair; scroll-behavior: smooth;
        }

        /* 背景：確保在最底層但夠亮 */
        #canvas-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; 
            background: radial-gradient(circle at center, #001a1a 0%, #000 100%); /* 加入微弱底色避免全黑 */
        }
        
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: -1; pointer-events: none;
        }

        .scanline {
            position: fixed; top: 0; width: 100%; height: 2px; background: rgba(0, 255, 255, 0.15);
            z-index: 1001; pointer-events: none; animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* --- 核心交互：黑洞引力按鈕 --- */
        nav {
            position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000; padding: 10px;
            background: rgba(0,0,0,0.85); border: 1px solid var(--border);
            backdrop-filter: blur(20px); clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
        }

        .nav-link {
            position: relative; padding: 15px 25px; color: #fff; text-decoration: none;
            font-size: 10px; font-weight: bold; letter-spacing: 3px; overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: radial-gradient(circle, #000 20%, var(--primary) 60%, transparent 100%);
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: -1; opacity: 0; transition: 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        .nav-link:hover { color: var(--primary); text-shadow: 0 0 15px var(--primary); transform: scale(1.1); }
        .nav-link:hover::before { width: 160px; height: 160px; opacity: 1; animation: swirl 1s infinite linear; }

        @keyframes swirl { 
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(0.1); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1.2); }
        }

        /* --- 頁面排版 --- */
        section { min-height: 100vh; padding: 100px 10%; display: flex; flex-direction: column; justify-content: center; position: relative; }

        .glitch-title {
            font-family: 'Syncopate', sans-serif; font-size: clamp(50px, 15vw, 180px);
            line-height: 0.8; font-weight: 700; position: relative;
        }
        .glitch-title span { display: block; color: var(--primary); text-shadow: 0 0 30px rgba(0,255,255,0.3); }

        .viewport-unit {
            width: 100%; aspect-ratio: 21/9; background: rgba(0, 20, 20, 0.5);
            border: 1px solid var(--primary); position: relative; margin-top: 50px;
            clip-path: polygon(0 0, 97% 0, 100% 10%, 100% 100%, 3% 100%, 0 90%);
        }

        .archive-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; margin-top: 100px; }
        .archive-item { position: relative; overflow: hidden; border: 1px solid var(--border); transition: 0.6s; background: #000; }
        .archive-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: saturate(0); transition: 0.8s; }
        .archive-item:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 0 30px rgba(0,255,255,0.2); }
        .archive-item:hover img { opacity: 0.9; filter: saturate(1); }

        .item-lg { grid-column: span 8; height: 500px; }
        .item-sm { grid-column: span 4; height: 500px; }
        .item-md { grid-column: span 6; height: 400px; }

        .portal-contact { text-align: center; padding: 150px 0; border: 1px dashed var(--primary); margin: 100px 0; }
        .portal-contact a { font-size: clamp(20px, 6vw, 80px); color: #fff; text-decoration: none; font-weight: 800; transition: 0.3s; }
        .portal-contact a:hover { color: var(--primary); text-shadow: 0 0 50px var(--primary); }

        footer { display: flex; justify-content: space-between; padding: 40px 10%; font-size: 10px; opacity: 0.6; border-top: 1px solid var(--border); }

        @media (max-width: 768px) { .archive-item { grid-column: span 12 !important; height: 300px; } }
    </style>
</head>
<body>

    <p style="max-width: 450px; margin-top: 50px; line-height: 2; font-size: 14px; color: var(--primary); border-left: 2px solid var(--primary); padding-left: 20px;">
        [SYSTEM_STATUS: ACTIVE]<br>
        引力模擬、空間運算、數位遺產構建中...
    </p>

<section id="archive">
    <div class="archive-grid">
        <div class="archive-item item-lg"><img src="https://images.unsplash.com/photo-1626379953822-baec19c3bbcd?auto=format&fit=crop&q=80&w=1200"></div>
        <div class="archive-item item-sm"><img src="https://images.unsplash.com/photo-1614853316476-de00d14cb1fc?auto=format&fit=crop&q=80&w=600"></div>
        <div class="archive-item item-md"><img src="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?auto=format&fit=crop&q=80&w=800"></div>
        <div class="archive-item item-md"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=800"></div>

    <div class="portal-contact">
        <a href="mailto:n0966785408@gmail.com">SEND_SIGNAL</a>
    </div>

<footer>
    <span>© 2026 YUYOU CHOU</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/sal.js@0.8.5/dist/sal.js"></script>

<script>
    let scene, camera, renderer, particles, mesh;
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 點雲增強：更大的點與加法混合 ---
        const pGeo = new THREE.BufferGeometry();
        const pCount = 3000;
        const pPos = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) { pPos[i] = (Math.random() - 0.5) * 150; }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        
        const pMat = new THREE.PointsMaterial({ 
            color: 0x00ffff, 
            size: 0.3, 
            transparent: true, 
            opacity: 0.8,
            blending: THREE.AdditiveBlending 
        });
        particles = new THREE.Points(pGeo, pMat);
        scene.add(particles);

        // --- 網格增強：亮色線條 ---
        const mGeo = new THREE.PlaneGeometry(150, 150, 50, 50);
        const mMat = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.2, // 提高亮度
            blending: THREE.AdditiveBlending
        });
        mesh = new THREE.Mesh(mGeo, mMat);
        mesh.rotation.x = -Math.PI / 2.5;
        mesh.position.y = -15;
        scene.add(mesh);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        targetX += (mouseX - targetX) * 0.05;
        targetY += (mouseY - targetY) * 0.05;
        const time = performance.now() * 0.001;

        particles.rotation.y = time * 0.03;
        
        const pos = mesh.geometry.attributes.position.array;
        for(let i=0; i<pos.length; i+=3) {
            const x = pos[i], y = pos[i+1];
            // 強化的重力凹陷效果
            const dx = x - (targetX * 100);
            const dy = y - (-targetY * 100);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const gravity = Math.exp(-(dist*dist)/(2*20*20)) * 25; // 擴大凹陷程度
            
            pos[i+2] = Math.sin(x*0.1 + time)*2 + Math.cos(y*0.1 + time)*2 - gravity;
        }
        mesh.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }

    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) - 0.5;
        mouseY = (e.clientY / window.innerHeight) - 0.5;
    });

    init();
    sal();
</script>
</body>
</html>
