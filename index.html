<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>YUYOU CHOU | THE_SINGULARITY</title>
    <style>
        :root {
            --primary: #00ffff;
            --bg: #000000;
            --border: rgba(0, 255, 255, 0.3);
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }

        /* --- 背景層：這就是你要的動態 --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- 黑洞交互按鈕：極致版 --- */
        .bh-nav { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        
        .bh-btn {
            position: relative; width: 120px; height: 50px; background: transparent;
            border: 1px solid var(--border); color: var(--primary); display: flex;
            align-items: center; justify-content: center; text-decoration: none;
            font-size: 10px; letter-spacing: 2px; overflow: hidden; transition: 0.3s;
        }

        /* 核心：黑洞吞噬動畫 */
        .bh-btn::before {
            content: ''; position: absolute; width: 0; height: 0; background: #000;
            border-radius: 50%; box-shadow: 0 0 30px var(--primary);
            transition: width 0.5s, height 0.5s; z-index: -1;
        }
        
        .bh-btn:hover { color: #fff; border-color: transparent; transform: scale(1.1); }
        .bh-btn:hover::before { width: 150px; height: 150px; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { transform: scale(0.8); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }

        /* --- 內容排版 --- */
        section { padding: 100px 10%; min-height: 100vh; }
        .title-unit { margin-top: 15vh; border-left: 5px solid var(--primary); padding-left: 30px; }
        h1 { font-size: 8vw; margin: 0; letter-spacing: -5px; }

        /* 影片 & 照片 預留位置 */
        .media-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 50px; }
        .video-slot { aspect-ratio: 16/9; background: #050505; border: 1px solid var(--border); position: relative; }
        .video-slot::after { content: 'VIDEO_FEED_READY'; position: absolute; center; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; font-size: 12px; }
        
        .photo-slot { aspect-ratio: 1/1; background: #080808; border: 1px dashed var(--border); overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .photo-slot:hover img { opacity: 1; transform: scale(1.1); }

    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="bh-nav">
    <a href="#" class="bh-btn">WORKSPACE</a>
    <a href="#" class="bh-btn">DATA_LOG</a>
    <a href="#" class="bh-btn">UPLINK</a>
</nav>

<section>
    <div class="title-unit">
        <p style="color: var(--primary)">[ USER_ID: YUYOU_CHOU ]</p>
        <h1>VIRTUAL<br>ARCHITECT.</h1>
    </div>

    <div class="media-grid">
        <!-- 影片區 -->
        <div class="video-slot">
             <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&controls=0" frameborder="0"></iframe>
        </div>
        <!-- 照片區 -->
        <div class="photo-slot">
            <img src="https://images.unsplash.com/photo-1614728263952-84ea206f99b6?auto=format&fit=crop&q=80&w=800">
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 這次背景動態的邏輯：空間扭曲網格 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // 建立一個巨大的平面網格
    const geometry = new THREE.PlaneGeometry(100, 100, 50, 50);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.15 });
    const plane = new THREE.Mesh(geometry, material);
    plane.rotation.x = -Math.PI / 2.5;
    scene.add(plane);

    camera.position.z = 30;
    camera.position.y = 10;

    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);
        
        const time = performance.now() * 0.001;
        const positions = plane.geometry.attributes.position.array;

        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i];
            const y = positions[i+1];

            // 基礎波浪
            let z = Math.sin(x * 0.2 + time) * 0.5 + Math.cos(y * 0.2 + time) * 0.5;

            // 重力塌陷邏輯：計算頂點與滑鼠的距離
            const dx = x - (mouse.x * 40);
            const dy = y - (mouse.y * 20);
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 15) {
                z -= (15 - dist) * 0.8; // 產生塌陷坑洞
            }

            positions[i+2] = z;
        }
        plane.geometry.attributes.position.needsUpdate = true;
        
        // 鏡頭隨滑鼠微動
        camera.position.x += (mouse.x * 5 - camera.position.x) * 0.05;
        
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
